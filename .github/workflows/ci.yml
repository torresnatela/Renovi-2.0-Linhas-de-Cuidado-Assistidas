name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# PRs cancelam runs antigos; na main os runs ENFILEIRAM — cancelar um run da
# main poderia interromper um deploy no meio (ex.: durante as migrations).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  api:
    name: Backend (Go)
    runs-on: ubuntu-latest
    env:
      # sqlc >= 1.31 exige Go 1.26; permite baixar o toolchain automaticamente.
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Lint (gofmt + vet)
        run: make lint

      - name: Generate check (código gerado atualizado?)
        run: make generate-check

      - name: Unit tests
        run: make test

      - name: Build
        run: make build

  api-integration:
    name: Backend — integração (testcontainers)
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum
      - name: Integration tests
        run: make test-integration

  web:
    name: Front (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # VITE_API_BASE_URL fica vazia de propósito (SPA e API na mesma origem).
      - run: npm run build

      # O dist testado aqui é o MESMO que a imagem de produção embarca (o
      # job deploy baixa este artifact — nada de rebuildar dentro do Docker).
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  # Valida os Dockerfiles no PR (sem push) — nada chega à main com imagem
  # quebrada. De quebra, aquece o cache de build usado pelo job deploy.
  docker-build-check:
    name: Docker build check
    if: github.event_name == 'pull_request'
    needs: [web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - uses: docker/setup-buildx-action@v3
      - name: Build api (sem push)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Build web (sem push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy (produção)
    needs: [api, api-integration, web]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: https://app.renovisaude.com.br
    # Deploy nunca é cancelado no meio; runs concorrentes enfileiram.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_API: ghcr.io/${{ github.repository_owner }}/renovi-care-api
      IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/renovi-care-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_API }}:${{ github.sha }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Preparar SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Host key da VPS fixada (evita TOFU/MITM; pública, não é segredo).
          echo '2.25.184.35 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID2TSqt0Z7XViNHSS9J4i0yR7jNU8mN5gWUDcaX+Dos+' >> ~/.ssh/known_hosts

      - name: Aguardar SSH da VPS (warm-up com retry)
        # A borda Hostinger tem anti-DDoS que descarta INTERMITENTEMENTE o 1º SYN
        # do IP (novo a cada run) do runner. Sem isto, um único pacote perdido
        # derruba o deploy com "connect ... port 22: Connection timed out" — o scp
        # não tem retry. Aquece a conexão antes; os vizinhos da VPS fazem o mesmo
        # (ver docs/DEPLOY.md). NÃO é allowlist de IP: a 22 responde da máquina do
        # dev; o que falha é o 1º contato do IP efêmero do runner.
        env:
          SSH_DEST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o ConnectTimeout=10"
          for i in $(seq 1 6); do
            if ssh $SSH_OPTS "$SSH_DEST" true 2>/tmp/ssh.err; then
              echo "SSH ok na tentativa $i/6"; exit 0
            fi
            echo "tentativa $i/6 falhou; aguardando 10s..."; sleep 10
          done
          echo "SSH não estabeleceu após 6 tentativas (anti-DDoS Hostinger?):" >&2
          cat /tmp/ssh.err >&2; exit 1

      - name: Render .env e .env.api
        # printf com env vars (nunca interpolação de shell): senhas com
        # caracteres especiais chegam intactas ao arquivo.
        env:
          CARE_DB_URL: ${{ secrets.RENOVI_CARE_DATABASE_URL }}
          CARE_MIGRATE_DB_URL: ${{ secrets.RENOVI_CARE_MIGRATE_DATABASE_URL }}
          LEGACY_DB_URL: ${{ secrets.RENOVI_LEGACY_DATABASE_URL }}
          DAV_BASE_URL: ${{ secrets.RENOVI_DAV_BASE_URL }}
          DAV_API_KEY: ${{ secrets.RENOVI_DAV_API_KEY }}
        run: |
          umask 077
          {
            printf 'IMAGE_TAG=%s\n' "${{ github.sha }}"
            printf 'GHCR_OWNER=%s\n' "${{ github.repository_owner }}"
          } > deploy/.env.render
          {
            printf 'RENOVI_ENV=production\n'
            printf 'RENOVI_LOG_LEVEL=info\n'
            printf 'RENOVI_CARE_DATABASE_URL=%s\n' "$CARE_DB_URL"
            printf 'RENOVI_CARE_MIGRATE_DATABASE_URL=%s\n' "$CARE_MIGRATE_DB_URL"
            printf 'RENOVI_LEGACY_DATABASE_URL=%s\n' "$LEGACY_DB_URL"
            printf 'RENOVI_DAV_BASE_URL=%s\n' "$DAV_BASE_URL"
            printf 'RENOVI_DAV_API_KEY=%s\n' "$DAV_API_KEY"
          } > deploy/.env.api.render

      - name: Enviar arquivos para a VPS
        env:
          SSH_DEST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o ConnectTimeout=10"
          scp $SSH_OPTS deploy/docker-compose.prod.yml "$SSH_DEST:/opt/renovi-care/docker-compose.prod.yml"
          scp $SSH_OPTS deploy/deploy-remote.sh       "$SSH_DEST:/opt/renovi-care/deploy-remote.sh"
          scp $SSH_OPTS deploy/.env.render            "$SSH_DEST:/opt/renovi-care/.env"
          scp $SSH_OPTS deploy/.env.api.render        "$SSH_DEST:/opt/renovi-care/.env.api"
          ssh $SSH_OPTS "$SSH_DEST" 'chmod 600 /opt/renovi-care/.env.api && chmod +x /opt/renovi-care/deploy-remote.sh'

      - name: Deploy na VPS (login ghcr + migrate + up + readyz)
        env:
          SSH_DEST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o ConnectTimeout=10"
          # Token via stdin: nunca aparece em argv/ps da VPS.
          printf '%s' "$GHCR_PULL_TOKEN" | ssh $SSH_OPTS "$SSH_DEST" \
            'docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin'
          ssh $SSH_OPTS "$SSH_DEST" 'bash /opt/renovi-care/deploy-remote.sh'

      - name: Verificação externa (DNS + TLS + borda + app)
        env:
          SSH_DEST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o ConnectTimeout=10"
          curl -fsS --retry 20 --retry-delay 15 --retry-all-errors \
            https://app.renovisaude.com.br/readyz
          echo "app OK"
          # Convivência: os outros sistemas da VPS precisam continuar no ar.
          OLD_DOMAIN=$(ssh $SSH_OPTS "$SSH_DEST" "grep -E '^DOMAIN=' /opt/renovi/.env | cut -d= -f2-")
          curl -fsSL -o /dev/null "https://${OLD_DOMAIN}" && echo "site antigo (${OLD_DOMAIN}) OK"
          curl -fsSL -o /dev/null https://gestao.renovisaude.com.br && echo "gestao OK"
