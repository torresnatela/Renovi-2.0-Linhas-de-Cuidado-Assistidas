openapi: 3.0.3
info:
  title: Renovi 2.0 — Plataforma do Paciente (API)
  description: >
    Contrato da API do renovi-care. Esta é a FONTE DA VERDADE: altere aqui
    primeiro, rode `make generate` e só então implemente (fluxo API-first,
    ver docs/DESENVOLVIMENTO.md). Hoje estão contratados /healthz, /readyz,
    /auth/*, /me e o agendamento (/specialties, /professionals, /appointments);
    as demais rotas do SPEC — a começar por /me/eligibility — entram nas fases
    seguintes sem breaking change (versionamento /api/v1).
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness — o processo está de pé.
      security: []
      responses:
        "200":
          description: Serviço vivo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /readyz:
    get:
      operationId: getReadiness
      summary: Readiness — dependências (banco) acessíveis.
      security: []
      responses:
        "200":
          description: Pronto para receber tráfego.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: "Não pronto (ex.: banco indisponível)."
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /auth/register:
    post:
      operationId: register
      summary: Cadastra o paciente e o vincula à Doutor ao Vivo (DAV).
      description: >
        Cria a conta e, de forma SÍNCRONA, resolve o vínculo com a DAV: se já
        existir uma pessoa com o mesmo CPF lá, ela é anexada (é onde vivem os
        dados de saúde); senão, é criada. A conta só fica utilizável se a DAV
        confirmar — por isso a chamada é síncrona e pode demorar (a DAV é lenta
        e o servidor faz retry). Se a DAV não responder, devolvemos 502/504 e a
        conta fica pendente: o usuário pode simplesmente tentar de novo.

        A resposta NUNCA revela se a pessoa já existia na DAV nem devolve
        qualquer dado vindo de lá — o CPF sozinho não pode servir de consulta a
        dados de terceiros.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Conta criada, vinculada à DAV e sessão aberta.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SessionCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: >
            Já existe conta para este CPF ou e-mail. A mensagem é genérica de
            propósito: dizer qual dos dois colidiu permitiria enumerar cadastros.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          $ref: "#/components/responses/DavUnavailable"
        "504":
          $ref: "#/components/responses/DavUnavailable"
  /auth/login:
    post:
      operationId: login
      summary: Abre uma sessão.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Sessão aberta.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SessionCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: >
            Credenciais inválidas. Resposta genérica e idêntica para CPF
            inexistente, senha errada e conta ainda não vinculada à DAV —
            diferenciá-las entregaria quais CPFs têm conta.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /auth/logout:
    post:
      operationId: logout
      summary: Encerra a sessão atual.
      responses:
        "204":
          description: Sessão encerrada e cookie limpo.
          headers:
            Set-Cookie:
              description: Cookie de sessão expirado.
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me:
    get:
      operationId: getMe
      summary: Dados da conta autenticada.
      responses:
        "200":
          description: A conta do portador da sessão.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
  # ---------------------------------------------------------------------------
  # Agendamento: especialidade -> profissional -> horário -> consulta -> entrar.
  #
  # SEM motor de elegibilidade nesta fase: quem decide "pode agendar?" ainda é só
  # a agenda do profissional. Quando /me/eligibility entrar, ele filtra ANTES
  # destas rotas, sem precisar mudá-las.
  #
  # Duas notas de nomenclatura:
  #
  # 1. "professional", não "doctor". Psicólogo não é médico, e metade do piloto é
  #    psicologia. É também o vocabulário dos dois sistemas com que falamos:
  #    tb_professionals no legado e /professional na DAV.
  # 2. A fundação reservou "/slots" solto. Era placeholder, não decisão (como o
  #    bearerAuth antes do ADR-010). Horário só existe dentro da agenda de um
  #    profissional: em /slots?professional_id= o parâmetro seria obrigatório mas
  #    pareceria opcional. O caminho aninhado diz a verdade.
  # ---------------------------------------------------------------------------
  /specialties:
    get:
      operationId: listSpecialties
      summary: Especialidades com atendimento disponível.
      description: >
        Primeiro passo. Vem do legado (tb_specialities, active = 1) e traz só o
        que leva a algum lugar: especialidade sem profissional com horário livre
        é beco sem saída, e o paciente não tem como saber que o problema não é
        dele.

        Lista vazia é resposta legítima (200). Legado fora do ar é 503. A
        diferença não é purismo: dizer "não há especialidades" quando o banco caiu
        faz o paciente desistir de algo que estava disponível.
      responses:
        "200":
          description: Especialidades disponíveis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialtyList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
  /specialties/{specialty_id}/professionals:
    get:
      operationId: listProfessionalsBySpecialty
      summary: Profissionais que atendem a especialidade.
      description: >
        Segundo passo. Só profissionais com horário livre futuro, pelo mesmo
        motivo do beco sem saída de /specialties.
      parameters:
        - $ref: "#/components/parameters/SpecialtyId"
      responses:
        "200":
          description: Profissionais da especialidade. Lista vazia é legítima.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
  /professionals/{professional_id}/slots:
    get:
      operationId: listProfessionalSlots
      summary: Horários livres do profissional.
      description: >
        Terceiro passo. Devolve só horários LIVRES e FUTUROS (tb_slots.booked = 0
        e início no futuro). Horário ocupado não é escondido por segurança, é
        escondido porque não serve para nada; e horário no passado a própria DAV
        recusa (422 — ver achado #18 em docs/DAV-API-NOTAS.md).

        `from`/`to` são DATAS e OPCIONAIS de propósito. Se fossem obrigatórias,
        todo cliente teria que calcular "hoje" — e "hoje" só existe dentro de um
        fuso. Quem sabe o fuso da agenda é o servidor, então é ele que resolve o
        default (hoje .. hoje+30d). A resposta ECOA o intervalo que ele de fato
        usou, e é com esses valores que o front pagina, em vez de recalcular
        datas por conta própria.
      parameters:
        - $ref: "#/components/parameters/ProfessionalId"
        - name: from
          in: query
          required: false
          description: "Primeiro dia do intervalo, no fuso da agenda. Default: hoje."
          schema:
            type: string
            format: date
          example: "2026-07-20"
        - name: to
          in: query
          required: false
          description: >
            Último dia, inclusive. Default: `from` + 30 dias. O intervalo é
            limitado a 60 dias; acima disso é 400, para que um cliente distraído
            não peça a agenda do ano inteiro ao MySQL de terceiro.
          schema:
            type: string
            format: date
          example: "2026-08-20"
      responses:
        "200":
          description: Horários livres no intervalo. Lista vazia é legítima.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
  /appointments:
    get:
      operationId: listMyAppointments
      summary: Minhas consultas.
      description: >
        Só as do portador da sessão. NÃO existe filtro por paciente, e é
        deliberado: seria uma pergunta que esta API nunca deve aceitar.

        Ordenadas por `starts_at` decrescente. Sem paginação hoje (um paciente do
        piloto tem um punhado de consultas); o envelope `items` existe para que
        acrescentar `next_cursor` depois não quebre ninguém — virar um array de
        topo em objeto, sim, quebraria.
      responses:
        "200":
          description: As consultas do paciente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createAppointment
      summary: Agenda a consulta (reserva no legado + cria na DAV).
      description: >
        Reserva o horário no legado (tb_slots.booked = 1), cria a consulta na DAV
        e espelha aqui com o link de acesso do paciente.

        É LENTO: o POST da DAV levou em média 10,5s e no máximo 17,2s na
        sondagem, contra o teto rígido de 29s do AWS API Gateway na frente deles.
        Toda tela que dispare isto PRECISA avisar — spinner mudo faz o usuário
        recarregar no meio.

        O corpo leva SÓ o `slot_id`: o profissional e a especialidade saem do
        próprio slot (slot -> shift -> profissional). Mandar de novo o que o
        servidor já sabe criaria uma segunda verdade para conferir.

        ATENÇÃO ao 502/504, que aqui é diferente do cadastro: o
        `POST /appointment` da DAV **não aceita id nosso** (400 "property id
        should not exist" — achado #12) e a DAV **não tem rota de busca de
        consulta**. Então, quando ela não responde, o resultado é DESCONHECIDO e
        permanece desconhecido: não dá para sondar depois. O horário fica retido
        e a consulta entra em revisão humana (status UNCONFIRMED). Repetir NÃO é
        seguro — criaria uma segunda consulta de verdade. É o oposto do
        /auth/register, que é idempotente pelo CPF.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Consulta agendada e confirmada na DAV.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            O horário não é mais agendável. `reason.code` diz qual caso:
            SLOT_TAKEN (alguém reservou antes — inclusive o app legado) ou
            SLOT_EXPIRED (já passou). Os dois pedem reações diferentes do front,
            por isso o código vem separado do texto.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          $ref: "#/components/responses/BookingUnconfirmed"
        "504":
          $ref: "#/components/responses/BookingUnconfirmed"
  /appointments/{appointment_id}:
    get:
      operationId: getAppointment
      summary: Uma consulta minha.
      description: >
        Consulta de outra pessoa responde 404, nunca 403: um 403 confirmaria que
        o id existe e a rota viraria um oráculo de ids válidos. Mesma regra do 409
        genérico do cadastro.

        NÃO devolve o link da sala em hipótese alguma — ver `join` e
        POST /appointments/{appointment_id}/join.
      parameters:
        - $ref: "#/components/parameters/AppointmentId"
      responses:
        "200":
          description: A consulta.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /appointments/{appointment_id}/join:
    post:
      operationId: joinAppointment
      summary: Devolve o link de acesso à sala — só com a janela aberta.
      description: >
        O link NÃO viaja no payload da consulta. Sai daqui, e só com a janela
        aberta, decidida com o relógio DO SERVIDOR. Se viesse em
        GET /appointments, a janela viraria regra do front: bastaria abrir o
        DevTools — ou ter o relógio errado — para entrar a qualquer hora, e o
        cache do cliente guardaria N links de teleconsulta que ninguém pediu. O
        link é uma CAPACIDADE, não um dado.

        É POST e não GET porque não é leitura pura (o acesso é registrado, e é o
        que vai alimentar a auto-conclusão da jornada) e porque POST não entra em
        cache de proxy, histórico do browser nem prefetch de link — três lugares
        onde o link de uma teleconsulta não deveria parar.

        O front NÃO usa esta rota para decidir se mostra o botão: para isso existe
        `Appointment.join`, que já traz o estado e a hora de abertura. Aqui o 409 é
        a rede de proteção da corrida (relógio adiantado, cache velho).
      parameters:
        - $ref: "#/components/parameters/AppointmentId"
      responses:
        "200":
          description: Janela aberta — o link de acesso do paciente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinTicket"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            A janela não está aberta. `reason.code`: JOIN_TOO_EARLY (cedo demais —
            `Appointment.join.opens_at` diz quando), JOIN_TOO_LATE (já terminou),
            JOIN_CANCELLED, ou JOIN_UNAVAILABLE (a consulta não está confirmada,
            ou a DAV não nos deu link — é falha nossa, e o paciente precisa saber
            disso e não de um "erro inesperado").
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  # /me/eligibility entra na fase seguinte JUNTO com sua implementação — o
  # contrato só descreve o que já existe (ver docs/PROGRESSO.md).
components:
  securitySchemes:
    # Sessão opaca em cookie httpOnly, não JWT (ver ADR-010 em docs/DECISOES.md).
    # Motivo: é revogável na hora (logout, troca de senha, incidente) e o token
    # nunca fica ao alcance de JavaScript — logo, não vaza por XSS.
    cookieAuth:
      type: apiKey
      in: cookie
      name: renovi_session
  headers:
    SessionCookie:
      description: >
        Cookie de sessão: HttpOnly, Secure (fora do ambiente local), SameSite=Lax.
      schema:
        type: string
        example: renovi_session=<opaco>; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=43200
  parameters:
    SpecialtyId:
      name: specialty_id
      in: path
      required: true
      description: >
        Id da especialidade no legado, OPACO. É `string` e o cliente não deve
        supor formato: hoje é UUID, mas é chave de um banco que não é nosso.
      schema:
        type: string
      example: 11111111-1111-4111-8111-111111111111
    ProfessionalId:
      name: professional_id
      in: path
      required: true
      description: >
        Id do profissional no legado, opaco (mesma razão de specialty_id).

        Detalhe que não aparece aqui mas explica o desenho: este id é TAMBÉM o id
        do profissional na DAV (recurso /professional). Por isso não existe
        tabela de mapeamento em lugar nenhum — ver docs/DAV-API-NOTAS.md.
      schema:
        type: string
      example: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa
    AppointmentId:
      name: appointment_id
      in: path
      required: true
      description: >
        Id da consulta no renovi_care (UUID v7). NUNCA o id do slot no legado nem
        o da consulta na DAV — id de terceiro não vaza para o cliente.
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Requisição inválida (campo faltando, CPF inválido, senha fraca).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Sessão ausente, expirada ou revogada.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: Tentativas demais. Tente novamente mais tarde.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    DavUnavailable:
      description: >
        A DAV não respondeu a tempo (504) ou respondeu com erro (502). O cadastro
        NÃO foi concluído e a conta não autentica; tentar de novo é seguro — a
        operação é idempotente pelo CPF.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: >
        Não existe — ou não é seu. Os dois respondem igual, de propósito:
        distinguir "não existe" de "não é seu" transformaria a rota num oráculo de
        ids válidos. Mesma razão do 409 genérico do cadastro.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    LegacyUnavailable:
      description: >
        A agenda do legado (MySQL) não respondeu. É 503 e não lista vazia: "não há
        horários" e "não conseguimos ler os horários" são coisas diferentes, e
        confundir as duas faz o paciente desistir de um profissional que estava
        livre.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    BookingUnconfirmed:
      description: >
        A DAV não confirmou a consulta (502 = erro dela, 504 = estourou o tempo).
        O horário JÁ foi reservado no legado e o resultado na DAV é DESCONHECIDO —
        nunca "falhou" (ADR-011b).

        A diferença cruel para o /auth/register: lá, tentar de novo é seguro
        porque o cadastro é idempotente pelo CPF e dá para sondar
        `GET /person/{nosso-id}`. Aqui NÃO: a DAV recusa id nosso no appointment
        (achado #12) e não tem rota de busca, então a consulta pode existir sem
        que exista qualquer forma de encontrá-la. Repetir criaria uma SEGUNDA
        consulta de verdade.

        Por isso: o horário fica retido (soltá-lo entregaria dois pacientes ao
        mesmo profissional), a consulta aparece em GET /appointments com status
        UNCONFIRMED, e quem resolve é gente. O cliente deve mandar o paciente para
        /appointments — não oferecer "tentar de novo".
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    RegisterRequest:
      type: object
      required: [full_name, cpf, birth_date, email, phone, password, address]
      properties:
        full_name:
          type: string
          minLength: 3
          maxLength: 150
        cpf:
          type: string
          pattern: '^\d{3}\.?\d{3}\.?\d{3}-?\d{2}$'
          description: Com ou sem formatação. O dígito verificador é conferido pela API.
          example: 948.190.898-46
        birth_date:
          type: string
          format: date
          example: "1976-01-23"
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          pattern: '^\d{10,11}$'
          description: Celular com DDD, só dígitos (10 ou 11).
          example: "11912345678"
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 256
          description: >
            Mínimo de 12 caracteres. Não exigimos maiúscula/símbolo: regras de
            composição empurram para "Senha1!" e a OWASP as desaconselha.
        address:
          $ref: "#/components/schemas/Address"
    Address:
      type: object
      required: [zip_code, street, number, neighborhood, city, state]
      properties:
        zip_code:
          type: string
          pattern: '^\d{5}-?\d{3}$'
          description: CEP, com ou sem traço.
          example: "06472000"
        street:
          type: string
          example: Avenida Copacabana
        number:
          type: string
          example: "238"
        complement:
          type: string
          example: 4o andar
        neighborhood:
          type: string
          example: Dezoito do Forte
        city:
          type: string
          example: Barueri
        state:
          type: string
          pattern: '^[A-Za-z]{2}$'
          description: UF.
          example: SP
        country:
          type: string
          minLength: 2
          maxLength: 2
          default: BR
    LoginRequest:
      type: object
      required: [cpf, password]
      properties:
        cpf:
          type: string
          description: >
            O CPF é o identificador de login, não o e-mail — é a chave de
            identidade do paciente e é sempre único.
          example: 948.190.898-46
        password:
          type: string
          format: password
    Account:
      description: >
        A conta do próprio portador da sessão. Deliberadamente enxuta: não
        carrega nada vindo da DAV nem o id de lá.
      type: object
      required: [id, full_name, email]
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
    HealthStatus:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        service:
          type: string
        version:
          type: string
        time:
          type: string
          format: date-time
    # ---- Vocabulário do domínio (motor de elegibilidade, ver docs/ARQUITETURA.md).
    # Contratado desde já para o front; a implementação entra em fase seguinte. ----
    ItemVerdict:
      type: object
      required: [item_code, status, reasons]
      properties:
        item_code:
          type: string
        status:
          type: string
          enum: [AVAILABLE, BLOCKED, QUOTA_EXHAUSTED, NOT_YET_OPEN, OVERDUE]
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/Reason"
        next_available_at:
          type: string
          format: date-time
          nullable: true
    Reason:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: >
            Código máquina-legível que o front traduz em frase. Ex.:
            QUOTA_EXHAUSTED_WEEKLY, MISSING_PREREQ:aval-psiquiatrica.
        detail:
          type: string
    # ---- Agendamento ----
    Specialty:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          example: 11111111-1111-4111-8111-111111111111
        name:
          type: string
          example: Psicologia
    SpecialtyList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Specialty"
    Professional:
      description: >
        O profissional como o paciente o vê na hora de escolher. Sem contato, sem
        CPF, sem agenda interna: o que não está aqui não vaza.
      type: object
      required: [id, full_name, license]
      properties:
        id:
          type: string
          example: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa
        full_name:
          type: string
          description: firstName + lastName do legado, já juntos.
          example: Ana Beatriz Moura
        image_url:
          type: string
          format: uri
          nullable: true
          description: >
            Foto. Nula é comum — a tela cai nas iniciais, não num ícone quebrado.
        license:
          $ref: "#/components/schemas/ProfessionalLicense"
    ProfessionalLicense:
      description: >
        Registro no conselho. É o que identifica publicamente o profissional e é
        com isso que o paciente escolhe — por isso é obrigatório, não enfeite.

        Vai em partes, e não como "CRP/SP 06/123456" pronto, porque as partes têm
        significado próprio: a região é uma UF e o RQE só existe para especialista
        (e por isso é exibido condicionalmente). Uma string pronta obrigaria o
        cliente a fazer parsing para qualquer coisa além de ecoar.
      type: object
      required: [council, number, region]
      properties:
        council:
          type: string
          description: "Conselho (licenseCouncil). Ex.: CRM (médico), CRP (psicólogo)."
          example: CRP
        number:
          type: string
          example: 06/123456
        region:
          type: string
          description: UF do registro.
          example: SP
        rqe:
          type: string
          nullable: true
          description: Registro de Qualificação de Especialista. Nulo quando não há.
          example: "54321"
    ProfessionalList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Professional"
    Slot:
      description: >
        Um horário livre. Autossuficiente de propósito: qualquer Slot, sozinho,
        tem tudo para ser renderizado certo, sem depender do contexto de onde veio.
      type: object
      required: [id, starts_at, ends_at, time_zone]
      properties:
        id:
          type: string
          description: Id do slot no legado (tb_slots), opaco.
          example: 50100000-0000-4000-8000-000000000001
        starts_at:
          type: string
          format: date-time
          description: >
            Instante do início, RFC 3339 COM offset. A origem no legado é DATETIME
            SEM fuso, que significa hora de parede de America/Sao_Paulo; quem
            resolve para instante é a API.

            Nunca mandamos "2026-07-20T09:00:00" sem offset: `new Date()` no
            browser leria isso no fuso do USUÁRIO, e um paciente viajando (ou um
            runner de CI em UTC) veria a hora errada — sem erro, sem aviso, só
            errado.
          example: "2026-07-20T09:00:00-03:00"
        ends_at:
          type: string
          format: date-time
          example: "2026-07-20T09:25:00-03:00"
        time_zone:
          type: string
          description: >
            Fuso IANA em que este horário DEVE ser exibido — o da agenda.

            Não é redundante com o offset de `starts_at`: o offset é propriedade
            de um INSTANTE, o fuso é a REGRA. A consulta é às 09:00 em São Paulo,
            e é 09:00 que o paciente precisa ler mesmo que o relógio dele esteja
            em Lisboa. Sem este campo o front só poderia formatar no fuso do
            browser — que é exatamente o erro.
          example: America/Sao_Paulo
    SlotPage:
      description: >
        A tela é "os horários da Ana": o profissional vem junto porque separá-lo
        em outra rota só acrescentaria um segundo estado de carregando e um
        segundo modo de falhar, para um dado que o servidor já tem em mãos.
      type: object
      required: [professional, from, to, items]
      properties:
        professional:
          $ref: "#/components/schemas/Professional"
        from:
          type: string
          format: date
          description: Primeiro dia do intervalo que o servidor de fato usou.
          example: "2026-07-20"
        to:
          type: string
          format: date
          description: Último dia (inclusive) que o servidor de fato usou.
          example: "2026-08-20"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Slot"
    CreateAppointmentRequest:
      type: object
      required: [slot_id]
      properties:
        slot_id:
          type: string
          description: >
            O horário escolhido. Sozinho basta: profissional e especialidade saem
            do próprio slot no legado.
          example: 50100000-0000-4000-8000-000000000001
    Appointment:
      description: >
        A consulta como o paciente a vê. Enxuta pelo mesmo motivo de `Account`:
        não carrega o id da DAV, nem o id do slot no legado, nem — jamais — o link
        da sala.
      type: object
      required: [id, status, starts_at, ends_at, time_zone, specialty, professional, join]
      properties:
        id:
          type: string
          format: uuid
          description: Id no renovi_care (UUID v7).
        status:
          type: string
          enum: [PROCESSING, CONFIRMED, UNCONFIRMED, CANCELLED]
          description: >
            O estado que interessa ao PACIENTE, não o estado interno da saga.

            - PROCESSING: reservamos o horário e estamos criando a consulta na DAV.
            - CONFIRMED: existe na DAV e temos o link. É o caso normal.
            - UNCONFIRMED: a DAV não respondeu e NÃO temos como descobrir se
              criou (ela recusa id nosso e não tem rota de busca — achado #12).
              O horário fica retido e alguém do time verifica. A tela precisa
              dizer isso com todas as letras: esconder seria pior, porque o
              paciente pode ter uma consulta de verdade marcada.
            - CANCELLED.

            Consulta que comprovadamente não aconteceu não aparece nesta lista.
        starts_at:
          type: string
          format: date-time
          example: "2026-07-20T09:00:00-03:00"
        ends_at:
          type: string
          format: date-time
          example: "2026-07-20T09:25:00-03:00"
        time_zone:
          type: string
          description: Fuso IANA para exibição (mesma regra de Slot.time_zone).
          example: America/Sao_Paulo
        specialty:
          $ref: "#/components/schemas/Specialty"
        professional:
          $ref: "#/components/schemas/Professional"
        join:
          $ref: "#/components/schemas/JoinWindow"
        created_at:
          type: string
          format: date-time
    AppointmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
    JoinWindow:
      description: >
        O ESTADO da janela de acesso — nunca o link. Vem junto da consulta porque
        é o que a tela precisa para obedecer à regra de ouro de UX do
        apps/web/CLAUDE.md: nunca um botão só desabilitado, sempre o motivo.

        Repare que "30 minutos" não existe em lugar nenhum deste contrato: o que
        viaja é `opens_at`, JÁ CALCULADO pelo servidor. O front espera uma hora
        que recebeu em vez de aplicar uma regra que decorou — então mudar a
        antecedência é uma linha no servidor, sem deploy do front, e relógio
        errado no cliente não abre a sala mais cedo.
      type: object
      required: [status, opens_at, closes_at]
      properties:
        status:
          type: string
          enum: [OPEN, TOO_EARLY, TOO_LATE, UNAVAILABLE]
          description: >
            Decidido com o relógio do SERVIDOR. UNAVAILABLE = a consulta não está
            confirmada ou não temos link para ela — é diferente de "ainda não" e
            merece outra frase.
        opens_at:
          type: string
          format: date-time
          description: A partir de quando o POST .../join devolve o link.
          example: "2026-07-20T08:30:00-03:00"
        closes_at:
          type: string
          format: date-time
          example: "2026-07-20T09:25:00-03:00"
        reason:
          $ref: "#/components/schemas/Reason"
    JoinTicket:
      description: >
        O link de acesso do paciente à sala da DAV. É uma CAPACIDADE, não um dado:
        não guarde em cache, não coloque em log, não mande por e-mail.
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://renovisaude.atendimento.hom.dav.med.br/a/piaxwqee5f
    Problem:
      description: Erro no formato RFC 7807 (problem+json).
      type: object
      required: [title, status]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        # Membro de extensão, previsto pela própria RFC 7807 (§3.2). Existe para
        # que um erro seja tratado por CÓDIGO e não por texto: "cedo demais" e
        # "consulta cancelada" são ambos 409, e o front reage diferente a cada um.
        # Casar pelo `detail` seria casar por frase escrita para humano — que muda
        # no dia em que alguém melhorar o texto.
        #
        # Reusa o `Reason` do motor de elegibilidade DE PROPÓSITO: uma tabela de
        # tradução só, no front, servindo erro e veredito.
        reason:
          $ref: "#/components/schemas/Reason"
security:
  - cookieAuth: []
