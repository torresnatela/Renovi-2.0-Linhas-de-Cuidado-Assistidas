openapi: 3.0.3
info:
  title: Renovi 2.0 — Plataforma do Paciente (API)
  description: >
    Contrato da API do renovi-care. Esta é a FONTE DA VERDADE: altere aqui
    primeiro, rode `make generate` e só então implemente (fluxo API-first,
    ver docs/DESENVOLVIMENTO.md). Hoje estão contratados /healthz, /readyz,
    /auth/*, /me, o agendamento (/specialties, /professionals, /appointments) e
    as linhas de cuidado do Slice 1: administração (/admin/care-lines,
    /admin/enrollments) e a jornada do paciente (/me/journey, /me/eligibility,
    /me/availability, /me/appointments, /me/audit). O que faltar do SPEC entra
    nas fases seguintes sem breaking change (versionamento /api/v1).
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness — o processo está de pé.
      security: []
      responses:
        "200":
          description: Serviço vivo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /readyz:
    get:
      operationId: getReadiness
      summary: Readiness — dependências (banco) acessíveis.
      security: []
      responses:
        "200":
          description: Pronto para receber tráfego.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: "Não pronto (ex.: banco indisponível)."
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /auth/register:
    post:
      operationId: register
      summary: Cadastra o paciente e o vincula à Doutor ao Vivo (DAV).
      description: >
        Cria a conta e, de forma SÍNCRONA, resolve o vínculo com a DAV: se já
        existir uma pessoa com o mesmo CPF lá, ela é anexada (é onde vivem os
        dados de saúde); senão, é criada. A conta só fica utilizável se a DAV
        confirmar — por isso a chamada é síncrona e pode demorar (a DAV é lenta
        e o servidor faz retry). Se a DAV não responder, devolvemos 502/504 e a
        conta fica pendente: o usuário pode simplesmente tentar de novo.

        A resposta NUNCA revela se a pessoa já existia na DAV nem devolve
        qualquer dado vindo de lá — o CPF sozinho não pode servir de consulta a
        dados de terceiros.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Conta criada, vinculada à DAV e sessão aberta.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SessionCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: >
            Já existe conta para este CPF ou e-mail. A mensagem é genérica de
            propósito: dizer qual dos dois colidiu permitiria enumerar cadastros.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          $ref: "#/components/responses/DavUnavailable"
        "504":
          $ref: "#/components/responses/DavUnavailable"
  /auth/login:
    post:
      operationId: login
      summary: Abre uma sessão.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Sessão aberta.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/SessionCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: >
            Credenciais inválidas. Resposta genérica e idêntica para CPF
            inexistente, senha errada e conta ainda não vinculada à DAV —
            diferenciá-las entregaria quais CPFs têm conta.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /auth/logout:
    post:
      operationId: logout
      summary: Encerra a sessão atual.
      responses:
        "204":
          description: Sessão encerrada e cookie limpo.
          headers:
            Set-Cookie:
              description: Cookie de sessão expirado.
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me:
    get:
      operationId: getMe
      summary: Dados da conta autenticada.
      responses:
        "200":
          description: A conta do portador da sessão.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
  # ---------------------------------------------------------------------------
  # Verificador Diário de Humor (Anexo C) — lado do paciente.
  #
  # Consentimento livre e informado (LGPD art. 11, dado sensível) é PRÉ-CONDIÇÃO
  # de gravação do check-in: sem consentimento ativo, nenhuma resposta é persistida.
  # ---------------------------------------------------------------------------
  /me/consent:
    get:
      operationId: getConsent
      summary: Status do consentimento do paciente para uma finalidade.
      parameters:
        - name: finalidade
          in: query
          required: false
          schema:
            type: string
          description: "Finalidade do consentimento. Default: checkin_humor."
      responses:
        "200":
          description: Situação atual do consentimento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: grantConsent
      summary: Concede consentimento (versionado). Idempotente para o mesmo termo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantConsentRequest"
      responses:
        "200":
          description: Consentimento ativo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/consent/revoke:
    post:
      operationId: revokeConsent
      summary: Revoga o consentimento ativo da finalidade. Idempotente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeConsentRequest"
      responses:
        "200":
          description: Consentimento revogado (ou já ausente).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/mood/instruments/{codigo}:
    get:
      operationId: getMoodInstrument
      summary: Configuração de um instrumento (dimensões, rótulos, tags de contexto).
      description: >
        Config que o front usa para desenhar a captura. Para o GRID (anel diário),
        traz as dimensões e os rótulos de emoção por quadrante + as tags de contexto.
        Cortes e polaridades são parâmetros versionados (instrument_cutoff).
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
          description: "Código do instrumento: GRID, WHO5 ou PHQ4."
      responses:
        "200":
          description: Configuração do instrumento ativo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstrumentConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/mood/checkin:
    post:
      operationId: recordMoodCheckin
      summary: Registra (ou atualiza) o check-in de humor do dia.
      description: >
        Captura obrigatória de 1 toque (valência×energia). Deriva o quadrante de
        forma determinística e emite o fato de execução na jornada. Uma resposta
        por dia local — repetir no mesmo dia atualiza a do dia. Exige matrícula
        ativa e vigente na linha que contém o item e consentimento ativo; sem eles,
        403 com `reason` (`consent_required` | `not_enrolled`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordMoodCheckinRequest"
      responses:
        "200":
          description: Check-in do dia registrado/atualizado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodCheckin"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Sem consentimento ativo ou sem matrícula elegível (ver `reason`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /me/mood/today:
    get:
      operationId: getMoodToday
      summary: O check-in de hoje (se houver) e a elegibilidade do paciente.
      responses:
        "200":
          description: Situação do dia.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodToday"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/mood/history:
    get:
      operationId: getMoodHistory
      summary: Série recente de check-ins do paciente.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
            maximum: 120
      responses:
        "200":
          description: Check-ins do mais recente ao mais antigo.
          content:
            application/json:
              schema:
                type: array
                maxItems: 120
                items:
                  $ref: "#/components/schemas/MoodCheckin"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/mood/help-now:
    post:
      operationId: moodHelpNow
      summary: Afordância "preciso de ajuda agora" — roteia ao canal de urgência.
      description: >
        Registra o pedido na jornada (trilha clínica/auditoria) e devolve o canal
        de urgência/care navigation — triagem, não tratamento (guardrail 6.2).
        NUNCA vai ao gestor.
      responses:
        "200":
          description: Canal de urgência para onde encaminhar o paciente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelpChannel"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/assessments/{codigo}:
    get:
      operationId: getAssessmentAvailability
      summary: Disponibilidade de um instrumento periódico (WHO-5, PHQ-4).
      description: >
        A cadência (MIN_INTERVAL) é avaliada pelo MOTOR de linhas de cuidado sobre
        o histórico imutável de aplicações — o front NÃO recalcula, exibe o
        `reason`/`available_from` do bloqueio.
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
          description: "Código do instrumento: WHO5 ou PHQ4."
      responses:
        "200":
          description: Disponibilidade e descritor do instrumento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentAvailability"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/assessments:
    post:
      operationId: submitAssessment
      summary: Submete as respostas de um instrumento periódico e o pontua.
      description: >
        Pontuação determinística com cortes da validação BR. Respeita a cadência
        (MIN_INTERVAL) via motor; reaplicação precoce é barrada com `blocks`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAssessmentRequest"
      responses:
        "200":
          description: Instrumento pontuado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Sem consentimento ativo ou sem matrícula elegível (ver `reason`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Reaplicação precoce — cadência não permite ainda (ver `blocks`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  # ---------------------------------------------------------------------------
  # Agendamento: especialidade -> profissional -> horário -> consulta -> entrar.
  #
  # SEM motor de elegibilidade nesta fase: quem decide "pode agendar?" ainda é só
  # a agenda do profissional. Quando /me/eligibility entrar, ele filtra ANTES
  # destas rotas, sem precisar mudá-las.
  #
  # Duas notas de nomenclatura:
  #
  # 1. "professional", não "doctor". Psicólogo não é médico, e metade do piloto é
  #    psicologia. É também o vocabulário dos dois sistemas com que falamos:
  #    tb_professionals no legado e /professional na DAV.
  # 2. A fundação reservou "/slots" solto. Era placeholder, não decisão (como o
  #    bearerAuth antes do ADR-010). Horário só existe dentro da agenda de um
  #    profissional: em /slots?professional_id= o parâmetro seria obrigatório mas
  #    pareceria opcional. O caminho aninhado diz a verdade.
  # ---------------------------------------------------------------------------
  /specialties:
    get:
      operationId: listSpecialties
      summary: Especialidades com atendimento disponível.
      description: >
        Primeiro passo. Vem do legado (tb_specialities, active = 1) e traz só o
        que leva a algum lugar: especialidade sem profissional com horário livre
        é beco sem saída, e o paciente não tem como saber que o problema não é
        dele.

        Lista vazia é resposta legítima (200). Legado fora do ar é 503. A
        diferença não é purismo: dizer "não há especialidades" quando o banco caiu
        faz o paciente desistir de algo que estava disponível.
      responses:
        "200":
          description: Especialidades disponíveis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialtyList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
  /specialties/{specialty_id}/professionals:
    get:
      operationId: listProfessionalsBySpecialty
      summary: Profissionais que atendem a especialidade.
      description: >
        Segundo passo. Só profissionais com horário livre futuro, pelo mesmo
        motivo do beco sem saída de /specialties.
      parameters:
        - $ref: "#/components/parameters/SpecialtyId"
      responses:
        "200":
          description: Profissionais da especialidade. Lista vazia é legítima.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
  /professionals/{professional_id}/slots:
    get:
      operationId: listProfessionalSlots
      summary: Horários livres do profissional.
      description: >
        Terceiro passo. Devolve só horários LIVRES e FUTUROS (tb_slots.booked = 0
        e início no futuro). Horário ocupado não é escondido por segurança, é
        escondido porque não serve para nada; e horário no passado a própria DAV
        recusa (422 — ver achado #18 em docs/DAV-API-NOTAS.md).

        `from`/`to` são DATAS e OPCIONAIS de propósito. Se fossem obrigatórias,
        todo cliente teria que calcular "hoje" — e "hoje" só existe dentro de um
        fuso. Quem sabe o fuso da agenda é o servidor, então é ele que resolve o
        default (hoje .. hoje+30d). A resposta ECOA o intervalo que ele de fato
        usou, e é com esses valores que o front pagina, em vez de recalcular
        datas por conta própria.
      parameters:
        - $ref: "#/components/parameters/ProfessionalId"
        - name: from
          in: query
          required: false
          description: "Primeiro dia do intervalo, no fuso da agenda. Default: hoje."
          schema:
            type: string
            format: date
          example: "2026-07-20"
        - name: to
          in: query
          required: false
          description: >
            Último dia, inclusive. Default: `from` + 30 dias. O intervalo é
            limitado a 60 dias; acima disso é 400, para que um cliente distraído
            não peça a agenda do ano inteiro ao MySQL de terceiro.
          schema:
            type: string
            format: date
          example: "2026-08-20"
      responses:
        "200":
          description: Horários livres no intervalo. Lista vazia é legítima.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
  /appointments:
    get:
      operationId: listMyAppointments
      summary: Minhas consultas.
      description: >
        Só as do portador da sessão. NÃO existe filtro por paciente, e é
        deliberado: seria uma pergunta que esta API nunca deve aceitar.

        Ordenadas por `starts_at` decrescente. Sem paginação hoje (um paciente do
        piloto tem um punhado de consultas); o envelope `items` existe para que
        acrescentar `next_cursor` depois não quebre ninguém — virar um array de
        topo em objeto, sim, quebraria.
      responses:
        "200":
          description: As consultas do paciente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createAppointment
      summary: Agenda a consulta (reserva no legado + cria na DAV).
      description: >
        Reserva o horário no legado (tb_slots.booked = 1), cria a consulta na DAV
        e espelha aqui com o link de acesso do paciente.

        É LENTO e IMPREVISÍVEL: o POST da DAV variou de ~3s a ~17s entre
        sondagens do MESMO dia, contra o teto rígido de 29s do AWS API Gateway na
        frente deles. Não é "alguns segundos" com uma cauda rara — a média dobra
        ou triplica de uma hora para outra. Toda tela que dispare isto PRECISA
        avisar — spinner mudo faz o usuário recarregar no meio.

        O corpo leva `slot_id` + `specialty_id`. O profissional NÃO vem: o slot já
        o determina (slot -> shift -> profissional). A especialidade vem porque o
        slot NÃO a determina — o vínculo profissional-especialidade é
        muitos-para-muitos no legado e há quem atenda três.

        ATENÇÃO ao 502/504, que aqui é diferente do cadastro: o
        `POST /appointment` da DAV **não aceita id nosso** (400 "property id
        should not exist" — achado #12) e a DAV **não tem rota de busca de
        consulta**. Então, quando ela não responde, o resultado é DESCONHECIDO e
        permanece desconhecido: não dá para sondar depois. O horário fica retido
        e a consulta entra em revisão humana (status UNCONFIRMED). Repetir NÃO é
        seguro — criaria uma segunda consulta de verdade. É o oposto do
        /auth/register, que é idempotente pelo CPF.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Consulta agendada e confirmada na DAV.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: >
            A conta ainda não está vinculada à Doutor ao Vivo, então não há
            paciente para pôr na consulta. Não deveria acontecer (só conta ACTIVE
            autentica, e ACTIVE exige o vínculo), mas o servidor confere antes de
            criar consulta órfã lá.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            O horário não é mais agendável. `reason.code` diz qual caso:
            SLOT_TAKEN (alguém reservou antes — inclusive o app legado) ou
            SLOT_EXPIRED (já passou). Os dois pedem reações diferentes do front,
            por isso o código vem separado do texto.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: >
            A DAV RECUSOU os dados da consulta (`reason.code` = BOOKING_REJECTED).
            Ao contrário do 502, aqui NADA foi criado e o horário foi liberado —
            tentar de novo é seguro. Nunca diga "pode ter sido marcada": não foi.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        # O agendamento LÊ e reserva a agenda do legado antes de falar com a DAV;
        # se o MySQL legado cair, a rota responde 503 (como as de catálogo).
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
        # Só 502 do lado da DAV. O 504 do gateway dela é traduzido pelo model em
        # BOOKING_UNCONFIRMED e sai como 502 — o cliente nunca recebe 504 daqui,
        # então declará-lo seria prometer uma resposta que não existe.
        "502":
          $ref: "#/components/responses/BookingUnconfirmed"
  /appointments/{appointment_id}:
    get:
      operationId: getAppointment
      summary: Uma consulta minha.
      description: >
        Consulta de outra pessoa responde 404, nunca 403: um 403 confirmaria que
        o id existe e a rota viraria um oráculo de ids válidos. Mesma regra do 409
        genérico do cadastro.

        NÃO devolve o link da sala em hipótese alguma — ver `join` e
        POST /appointments/{appointment_id}/join.
      parameters:
        - $ref: "#/components/parameters/AppointmentId"
      responses:
        "200":
          description: A consulta.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /appointments/{appointment_id}/join:
    post:
      operationId: joinAppointment
      summary: Devolve o link de acesso à sala — só com a janela aberta.
      description: >
        O link NÃO viaja no payload da consulta. Sai daqui, e só com a janela
        aberta, decidida com o relógio DO SERVIDOR. Se viesse em
        GET /appointments, a janela viraria regra do front: bastaria abrir o
        DevTools — ou ter o relógio errado — para entrar a qualquer hora, e o
        cache do cliente guardaria N links de teleconsulta que ninguém pediu. O
        link é uma CAPACIDADE, não um dado.

        É POST e não GET porque não é leitura pura (o acesso é registrado, e é o
        que vai alimentar a auto-conclusão da jornada) e porque POST não entra em
        cache de proxy, histórico do browser nem prefetch de link — três lugares
        onde o link de uma teleconsulta não deveria parar.

        O front NÃO usa esta rota para decidir se mostra o botão: para isso existe
        `Appointment.join`, que já traz o estado e a hora de abertura. Aqui o 409 é
        a rede de proteção da corrida (relógio adiantado, cache velho).
      parameters:
        - $ref: "#/components/parameters/AppointmentId"
      responses:
        "200":
          description: Janela aberta — o link de acesso do paciente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinTicket"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            A janela não está aberta. `reason.code`: JOIN_TOO_EARLY (cedo demais —
            `Appointment.join.opens_at` diz quando), JOIN_TOO_LATE (já terminou),
            JOIN_CANCELLED, ou JOIN_UNAVAILABLE (a consulta não está confirmada,
            ou a DAV não nos deu link — é falha nossa, e o paciente precisa saber
            disso e não de um "erro inesperado").
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  # ===========================================================================
  # Linhas de cuidado — Slice 1 (SPEC §3). Duas audiências bem separadas:
  #
  #  - /admin/*  : a OPERAÇÃO monta o template (linha -> itens -> regras), publica
  #                e matricula pacientes. Autentica por TOKEN estático (adminToken),
  #                NUNCA pelo cookie de sessão do paciente.
  #  - /me/*     : o PACIENTE lê a própria jornada, consulta elegibilidade, vê a
  #                disponibilidade e agenda o que o motor liberar. Mesmo escopo-do-
  #                próprio-usuário das rotas de agendamento (herda cookieAuth global).
  #
  # O motor de elegibilidade decide "pode agendar?" ANTES do booking: /me/availability
  # já traz o veredito por horário e POST /me/appointments recusa (422) o que ele
  # barrar. O booking em si reaproveita o fluxo /appointments — por isso
  # CareAppointment carrega o `booking_id`.
  # ===========================================================================
  /admin/care-lines:
    post:
      operationId: createCareLine
      summary: Cria uma linha de cuidado (draft).
      description: >
        Nasce sempre `draft`: um rascunho editável, sem efeito sobre matrículas. O
        admin acrescenta itens e regras e só então publica. O `code` é a chave
        estável da linha entre versões; duas linhas draft com o mesmo code são 409.
      security:
        - adminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCareLineRequest"
      responses:
        "201":
          description: Linha criada em draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareLine"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Já existe uma linha draft com este `code`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    get:
      operationId: listCareLines
      summary: Lista as linhas de cuidado.
      description: >
        Todas as versões, draft e published. `code` filtra por uma linha (todas as
        suas versões); ausente, traz o catálogo inteiro.
      security:
        - adminToken: []
      parameters:
        - name: code
          in: query
          required: false
          description: Filtra por uma linha específica (todas as versões desse code).
          schema:
            type: string
      responses:
        "200":
          description: As linhas de cuidado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareLineList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /admin/care-lines/{care_line_id}/items:
    post:
      operationId: createCareLineItem
      summary: Acrescenta um item à linha (só em draft).
      description: >
        Um item é um passo — no Slice 1, uma consulta de uma especialidade. Só se
        acrescenta item a uma linha `draft`: uma linha `published` é imutável (409).
      security:
        - adminToken: []
      parameters:
        - $ref: "#/components/parameters/CareLineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCareLineItemRequest"
      responses:
        "201":
          description: Item acrescentado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareLineItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A linha já está publicada e é imutável.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /admin/care-lines/{care_line_id}/items/{item_ref}/rules:
    post:
      operationId: createCareLineItemRule
      summary: Prende uma regra de elegibilidade a um item (só em draft).
      description: >
        A regra (QUOTA, MIN_INTERVAL, MAX_ADVANCE ou PREREQUISITE) é o que o motor
        avalia para liberar o item. Só em linha `draft` (409 se published). O item é
        referenciado pelo `ref`, não por UUID.
      security:
        - adminToken: []
      parameters:
        - $ref: "#/components/parameters/CareLineId"
        - $ref: "#/components/parameters/ItemRef"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCareLineRuleRequest"
      responses:
        "201":
          description: Regra prendida ao item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareLineRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A linha já está publicada e é imutável.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /admin/care-lines/{care_line_id}/publish:
    post:
      operationId: publishCareLine
      summary: Publica a linha (draft -> published).
      description: >
        Congela o template e passa a valê-lo para novas matrículas; a versão sobe.
        Antes de publicar, o servidor VALIDA o template inteiro (itens com
        especialidade, pré-requisitos apontando para itens que existem, etc.). Se
        algo estiver inconsistente, 400 com `errors[]` — a lista toda, para o admin
        corrigir de uma vez.
      security:
        - adminToken: []
      parameters:
        - $ref: "#/components/parameters/CareLineId"
      responses:
        "200":
          description: Linha publicada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareLine"
        "400":
          $ref: "#/components/responses/PublishInvalid"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A linha já está publicada.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          # A publicação valida as especialidades do item contra o legado (MySQL).
          # Se ele não responde, a validação não pode concluir: 503, como as rotas de
          # catálogo do agendamento — não é "template inválido", é "não deu para checar".
          $ref: "#/components/responses/LegacyUnavailable"
  /admin/enrollments:
    post:
      operationId: createEnrollment
      summary: Matricula um paciente numa linha.
      description: >
        Liga o paciente à ÚLTIMA versão publicada da linha (`care_line_code`), com
        vigência de `months` meses. A versão é congelada na matrícula. Um paciente
        não pode ter duas matrículas VIVAS na mesma linha (409).
      security:
        - adminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnrollmentRequest"
      responses:
        "201":
          description: Matrícula criada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Paciente inexistente ou linha sem versão publicada.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: O paciente já tem uma matrícula viva nesta linha.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /admin/enrollments/{enrollment_id}/renew:
    post:
      operationId: renewEnrollment
      summary: Renova a matrícula (acrescenta um período de vigência).
      description: >
        Acrescenta `months` meses à vigência como um NOVO período — não edita o
        atual, para a jornada guardar por quais janelas o paciente passou. Não se
        renova matrícula já `concluida` ou `encerrada` (409): são desfechos finais.
      security:
        - adminToken: []
      parameters:
        - $ref: "#/components/parameters/EnrollmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewEnrollmentRequest"
      responses:
        "200":
          description: Matrícula renovada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Matrícula em desfecho final (concluida/encerrada) não renova.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /admin/enrollments/{enrollment_id}/end:
    post:
      operationId: endEnrollment
      summary: Encerra a matrícula (desfecho deliberado).
      description: >
        Marca a matrícula como `concluida` (paciente terminou a linha) ou
        `encerrada` (interrompida). O `reason` fica no event log. Uma matrícula já
        em desfecho final não é encerrada de novo (409).
      security:
        - adminToken: []
      parameters:
        - $ref: "#/components/parameters/EnrollmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndEnrollmentRequest"
      responses:
        "200":
          description: Matrícula encerrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Matrícula já em desfecho final.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  # ---- Paciente (cookieAuth global, escopo do próprio usuário) ----
  /me/journey:
    get:
      operationId: getMyJourney
      summary: A jornada do paciente (todas as matrículas, item a item).
      description: >
        A tela-mãe do paciente: cada matrícula com seus itens JÁ avaliados pelo
        motor (o que pode agendar agora e por quê) e os eventos recentes. É a soma
        de matrícula + template + elegibilidade num payload só, para a tela não
        cruzar três chamadas.
      responses:
        "200":
          description: A jornada do portador da sessão.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Journey"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/eligibility:
    get:
      operationId: getMyEligibility
      summary: O veredito do motor para um item, agora (ou numa data).
      description: >
        Responde "posso agendar ESTE item?" — sem tocar na agenda do legado. O
        `item_id` tem que ser de um item de uma linha em que o paciente está
        matriculado; senão 404 (nunca 403, para a rota não virar oráculo de ids). A
        `date` é opcional: ausente, avalia AGORA; presente, simula o veredito
        naquele instante (útil para "quando isto libera?").
      parameters:
        - name: item_id
          in: query
          required: true
          description: Id do item da linha (UUID).
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: false
          description: "Instante da avaliação (RFC 3339). Default: agora."
          schema:
            type: string
            format: date-time
          example: "2026-08-01T12:00:00-03:00"
      responses:
        "200":
          description: O veredito do motor para o item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Eligibility"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/availability:
    get:
      operationId: getMyAvailability
      summary: Horários agendáveis para um item da linha.
      description: >
        Agrega os horários livres dos VÁRIOS profissionais da especialidade do item
        e anexa, por horário, o profissional e o veredito do motor. É o passo que
        casa a agenda do legado com a elegibilidade — o que /professionals/{id}/slots
        faz para um profissional só, esta faz para o item inteiro. `from`/`to` são
        datas opcionais (default a cargo do servidor, mesma razão do SlotPage).
      parameters:
        - name: item_id
          in: query
          required: true
          description: Id do item da linha (UUID).
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          description: "Primeiro dia do intervalo, no fuso da agenda. Default: hoje."
          schema:
            type: string
            format: date
          example: "2026-07-20"
        - name: to
          in: query
          required: false
          description: "Último dia, inclusive. Default a cargo do servidor."
          schema:
            type: string
            format: date
          example: "2026-08-20"
      responses:
        "200":
          description: Horários agendáveis no intervalo. Lista vazia é legítima.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
  /me/appointments:
    get:
      operationId: listMyCareAppointments
      summary: As consultas de linha de cuidado do paciente.
      description: >
        As consultas do portador da sessão, na visão da jornada (amarradas ao item
        da linha). Distinta de GET /appointments, que é o booking cru. `status`
        filtra pelos estados da consulta na jornada.
      parameters:
        - name: status
          in: query
          required: false
          description: Filtra por status da consulta.
          schema:
            type: string
            enum: [agendada, confirmada, em_andamento, realizada, falta, cancelada]
      responses:
        "200":
          description: As consultas de linha do paciente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareAppointmentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMyCareAppointment
      summary: Agenda a consulta de um item da linha.
      description: >
        Passa pelo motor ANTES de reservar: se a elegibilidade barrar, 422 com
        `blocks[]` (o horário existe e está livre — o que não pode é este paciente
        agendar este item agora). Liberado, reserva o horário no legado e cria a
        consulta no booking (reaproveita o fluxo /appointments), devolvendo o
        `booking_id`.

        É IDEMPOTENTE pelo header `Idempotency-Key`: a MESMA key devolve a MESMA
        resposta sem criar uma segunda consulta — a rede de proteção contra o
        duplo-clique e o retry num POST que é lento (o booking fala com a DAV, que é
        imprevisível). Primeira chamada: 201. Replay da mesma key: 200 com a
        consulta já criada. Herda o 502 do booking (BOOKING_UNCONFIRMED): quando a
        DAV não confirma, o resultado é DESCONHECIDO e repetir NÃO é seguro.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: >
            Chave de idempotência gerada pelo cliente (UUID recomendado). A MESMA
            key devolve a MESMA resposta sem duplicar a consulta; keys diferentes
            são pedidos diferentes. Obrigatória: sem ela, 400.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCareAppointmentRequest"
      responses:
        "201":
          description: Consulta agendada e confirmada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareAppointment"
        "200":
          description: >
            Replay de uma `Idempotency-Key` já usada — a MESMA consulta da primeira
            chamada, sem criar outra.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareAppointment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: >
            A conta ainda não está vinculada à Doutor ao Vivo, então não há
            paciente para pôr na consulta. Não deveria acontecer (só conta ACTIVE
            autentica, e ACTIVE exige o vínculo), mas o servidor confere antes de
            criar consulta órfã lá. O MESMO 403 do POST /appointments.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            O horário não é mais agendável. `reason.code`: SLOT_TAKEN (alguém
            reservou antes) ou SLOT_EXPIRED (já passou) — os mesmos códigos de
            POST /appointments.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: >
            Dois casos distintos, ambos 422 e ambos no `Problem`, separados por
            `reason.code`:

            (1) ELIGIBILITY_BLOCKED — o motor de elegibilidade BARROU antes de
            reservar; o `Problem` traz `blocks[]` com um `EligibilityBlock` por
            regra violada (o horário existe e está livre — o que não pode é ESTE
            paciente agendar ESTE item agora). É a resposta EligibilityBlocked.

            (2) BOOKING_REJECTED — a elegibilidade passou e a saga de booking foi
            adiante, mas a DAV RECUSOU os dados da consulta (o MESMO 422 do
            POST /appointments). NADA foi criado e o horário foi liberado, então
            tentar de novo é seguro; nunca diga "pode ter sido marcada" — não foi.
            Distinto do (1): NÃO traz `blocks[]`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        # O agendamento LÊ e reserva a agenda do legado antes de falar com a DAV;
        # se o MySQL legado cair, a rota responde 503 (como o POST /appointments).
        "503":
          $ref: "#/components/responses/LegacyUnavailable"
        "502":
          $ref: "#/components/responses/BookingUnconfirmed"
  /me/appointments/{care_appointment_id}/cancel:
    post:
      operationId: cancelMyCareAppointment
      summary: Cancela uma consulta de linha do paciente.
      description: >
        Cancela a consulta e devolve a cota ao item (o motor volta a liberá-lo). Só
        de estados canceláveis: consulta já realizada, faltada ou cancelada não
        cancela de novo (409). Consulta de outra pessoa é 404, nunca 403.
      parameters:
        - $ref: "#/components/parameters/CareAppointmentId"
      responses:
        "200":
          description: Consulta cancelada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareAppointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A consulta não está num estado cancelável.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /me/audit:
    get:
      operationId: getMyAudit
      summary: O event log da jornada do paciente (auditoria).
      description: >
        O histórico append-only dos fatos da jornada do portador da sessão,
        paginado por cursor OPACO. `cursor` ausente começa do início; a resposta
        traz `next_cursor` até o fim. `limit` entre 1 e 100 (default 50).
      parameters:
        - name: cursor
          in: query
          required: false
          description: Cursor opaco da página anterior. Ausente = começa do início.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Quantos eventos por página (1..100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Uma página do event log.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"
        "400":
          description: Cursor inválido.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          $ref: "#/components/responses/Unauthorized"
  # ---- Interno (dev/teste; SÓ com RENOVI_TEST_ENDPOINTS, nunca em produção) ----
  /internal/appointments/{care_appointment_id}/force-status:
    post:
      operationId: forceCareAppointmentStatus
      summary: Força o status de uma consulta (rota interna de teste).
      description: >
        Marca a consulta como `realizada` ou `falta` sem esperar o fluxo real —
        atalho para testar a auto-conclusão da jornada e os lembretes de OVERDUE. A
        rota SÓ existe quando o servidor sobe com RENOVI_TEST_ENDPOINTS habilitado;
        em produção ela simplesmente não é registrada. Por isso `security: []`: é de
        ambiente de teste, não de operação.
      security: []
      parameters:
        - $ref: "#/components/parameters/CareAppointmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForceStatusRequest"
      responses:
        "200":
          description: Status forçado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareAppointment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            A consulta já está num estado terminal (realizada, falta ou
            cancelada) e não aceita forçar status. `reason.code`:
            FORCE_STATUS_NOT_ALLOWED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
components:
  securitySchemes:
    # Sessão opaca em cookie httpOnly, não JWT (ver ADR-010 em docs/DECISOES.md).
    # Motivo: é revogável na hora (logout, troca de senha, incidente) e o token
    # nunca fica ao alcance de JavaScript — logo, não vaza por XSS.
    cookieAuth:
      type: apiKey
      in: cookie
      name: renovi_session
    # Token estático das rotas /admin. NÃO há tela de admin no Slice 1: quem opera
    # é gente do time com um token fora de banda, não uma conta de paciente.
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: >
        Token estático de operação para as rotas /admin. Vive numa variável de
        ambiente do servidor e a rotação é MANUAL (troca a env e reinicia) — não há
        tela de admin nem gestão de credencial no Slice 1. NUNCA é o cookie de
        sessão do paciente: as rotas /admin exigem este header e recusam a sessão,
        e as de paciente fazem o inverso.
  headers:
    SessionCookie:
      description: >
        Cookie de sessão: HttpOnly, Secure (fora do ambiente local), SameSite=Lax.
      schema:
        type: string
        example: renovi_session=<opaco>; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=43200
  parameters:
    SpecialtyId:
      name: specialty_id
      in: path
      required: true
      description: >
        Id da especialidade no legado, OPACO. É `string` e o cliente não deve
        supor formato: hoje é UUID, mas é chave de um banco que não é nosso.
      schema:
        type: string
      example: 11111111-1111-4111-8111-111111111111
    ProfessionalId:
      name: professional_id
      in: path
      required: true
      description: >
        Id do profissional no legado, opaco (mesma razão de specialty_id).

        Detalhe que não aparece aqui mas explica o desenho: este id é TAMBÉM o id
        do profissional na DAV (recurso /professional). Por isso não existe
        tabela de mapeamento em lugar nenhum — ver docs/DAV-API-NOTAS.md.
      schema:
        type: string
      example: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa
    AppointmentId:
      name: appointment_id
      in: path
      required: true
      description: >
        Id da consulta no renovi_care (UUID v7). NUNCA o id do slot no legado nem
        o da consulta na DAV — id de terceiro não vaza para o cliente.
      schema:
        type: string
        format: uuid
    CareLineId:
      name: care_line_id
      in: path
      required: true
      description: Id da linha de cuidado no renovi_care (UUID v7).
      schema:
        type: string
        format: uuid
    ItemRef:
      name: item_ref
      in: path
      required: true
      description: >
        O `ref` do item DENTRO da linha (código estável), não um UUID: é assim que
        as regras referenciam o item, e é estável entre versões da linha.
      schema:
        type: string
      example: aval-inicial
    EnrollmentId:
      name: enrollment_id
      in: path
      required: true
      description: Id da matrícula no renovi_care (UUID v7).
      schema:
        type: string
        format: uuid
    CareAppointmentId:
      name: care_appointment_id
      in: path
      required: true
      description: >
        Id da consulta de linha de cuidado no renovi_care (UUID v7). NÃO é o
        `booking_id` do módulo de agendamento — este amarra a consulta ao item da
        linha e ao motor.
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Requisição inválida (campo faltando, CPF inválido, senha fraca).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Sessão ausente, expirada ou revogada.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: Tentativas demais. Tente novamente mais tarde.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    DavUnavailable:
      description: >
        A DAV não respondeu a tempo (504) ou respondeu com erro (502). O cadastro
        NÃO foi concluído e a conta não autentica; tentar de novo é seguro — a
        operação é idempotente pelo CPF.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: >
        Não existe — ou não é seu. Os dois respondem igual, de propósito:
        distinguir "não existe" de "não é seu" transformaria a rota num oráculo de
        ids válidos. Mesma razão do 409 genérico do cadastro.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    LegacyUnavailable:
      description: >
        A agenda do legado (MySQL) não respondeu. É 503 e não lista vazia: "não há
        horários" e "não conseguimos ler os horários" são coisas diferentes, e
        confundir as duas faz o paciente desistir de um profissional que estava
        livre.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    BookingUnconfirmed:
      description: >
        A DAV não confirmou a consulta (502 = erro dela, 504 = estourou o tempo).
        O horário JÁ foi reservado no legado e o resultado na DAV é DESCONHECIDO —
        nunca "falhou" (ADR-011b).

        A diferença cruel para o /auth/register: lá, tentar de novo é seguro
        porque o cadastro é idempotente pelo CPF e dá para sondar
        `GET /person/{nosso-id}`. Aqui NÃO: a DAV recusa id nosso no appointment
        (achado #12) e não tem rota de busca, então a consulta pode existir sem
        que exista qualquer forma de encontrá-la. Repetir criaria uma SEGUNDA
        consulta de verdade.

        Por isso: o horário fica retido (soltá-lo entregaria dois pacientes ao
        mesmo profissional), a consulta aparece em GET /appointments com status
        UNCONFIRMED, e quem resolve é gente. O cliente deve mandar o paciente para
        /appointments — não oferecer "tentar de novo".
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    EligibilityBlocked:
      description: >
        O motor de elegibilidade BARROU o agendamento. O `Problem` traz `blocks[]`
        com um `EligibilityBlock` por regra violada (cada um com `reason` pronto
        para exibir e, quando o desbloqueio é por tempo, `available_from`). É 422 e
        não 409 de propósito: o horário existe e está livre — o que não pode é ESTE
        paciente agendar ESTE item agora.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    PublishInvalid:
      description: >
        A linha não pôde ser publicada porque o template está inconsistente. O
        `Problem` traz `errors[]` com a lista de problemas (ex.: pré-requisito que
        aponta para item inexistente, item sem especialidade). Vem a lista TODA, e
        não um erro por vez, porque o admin quer corrigir tudo de uma vez.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    RegisterRequest:
      type: object
      required: [full_name, cpf, birth_date, email, phone, password, address]
      properties:
        full_name:
          type: string
          minLength: 3
          maxLength: 150
        cpf:
          type: string
          pattern: '^\d{3}\.?\d{3}\.?\d{3}-?\d{2}$'
          description: Com ou sem formatação. O dígito verificador é conferido pela API.
          example: 948.190.898-46
        birth_date:
          type: string
          format: date
          example: "1976-01-23"
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          pattern: '^\d{10,11}$'
          description: Celular com DDD, só dígitos (10 ou 11).
          example: "11912345678"
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 256
          description: >
            Mínimo de 12 caracteres. Não exigimos maiúscula/símbolo: regras de
            composição empurram para "Senha1!" e a OWASP as desaconselha.
        address:
          $ref: "#/components/schemas/Address"
    Address:
      type: object
      required: [zip_code, street, number, neighborhood, city, state]
      properties:
        zip_code:
          type: string
          pattern: '^\d{5}-?\d{3}$'
          description: CEP, com ou sem traço.
          example: "06472000"
        street:
          type: string
          example: Avenida Copacabana
        number:
          type: string
          example: "238"
        complement:
          type: string
          example: 4o andar
        neighborhood:
          type: string
          example: Dezoito do Forte
        city:
          type: string
          example: Barueri
        state:
          type: string
          pattern: '^[A-Za-z]{2}$'
          description: UF.
          example: SP
        country:
          type: string
          minLength: 2
          maxLength: 2
          default: BR
    LoginRequest:
      type: object
      required: [cpf, password]
      properties:
        cpf:
          type: string
          description: >
            O CPF é o identificador de login, não o e-mail — é a chave de
            identidade do paciente e é sempre único.
          example: 948.190.898-46
        password:
          type: string
          format: password
    Account:
      description: >
        A conta do próprio portador da sessão. Deliberadamente enxuta: não
        carrega nada vindo da DAV nem o id de lá.
      type: object
      required: [id, full_name, email]
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
    ConsentStatus:
      description: >
        Situação do consentimento do paciente para uma finalidade. `active`
        resume: o front só grava check-in quando há consentimento ativo.
      type: object
      required: [finalidade, active]
      properties:
        finalidade:
          type: string
          example: checkin_humor
        active:
          type: boolean
          description: true quando há consentimento ativo para a finalidade.
        versao_termo:
          type: string
          nullable: true
          description: Versão do termo aceito (presente quando ativo).
        concedido_em:
          type: string
          format: date-time
          nullable: true
          description: Quando o consentimento ativo foi concedido.
    GrantConsentRequest:
      type: object
      required: [finalidade, versao_termo]
      properties:
        finalidade:
          type: string
          example: checkin_humor
        versao_termo:
          type: string
          example: v1
    RevokeConsentRequest:
      type: object
      required: [finalidade]
      properties:
        finalidade:
          type: string
          example: checkin_humor
    InstrumentConfig:
      description: >
        Config de um instrumento para o front desenhar a captura. Cortes e
        polaridades são parâmetros versionados; o front não os recalcula.
      type: object
      required: [codigo, versao, anel, dimensions, emotion_labels, context_tags]
      properties:
        codigo:
          type: string
          example: GRID
        versao:
          type: string
          example: "1"
        anel:
          type: string
          enum: [diario, semanal, gatilhado]
        dimensions:
          type: array
          items:
            $ref: "#/components/schemas/InstrumentDimension"
        emotion_labels:
          type: array
          items:
            $ref: "#/components/schemas/EmotionLabel"
        context_tags:
          type: array
          items:
            $ref: "#/components/schemas/ContextTag"
    InstrumentDimension:
      type: object
      required: [dimensao, polaridade, min_score, max_score]
      properties:
        dimensao:
          type: string
          example: valencia
        polaridade:
          type: string
          enum: [positiva, negativa]
        min_score:
          type: number
        max_score:
          type: number
    EmotionLabel:
      type: object
      required: [quadrante, rotulo]
      properties:
        quadrante:
          type: string
          example: desagradavel_calmo
        rotulo:
          type: string
          example: Desanimado
    ContextTag:
      type: object
      required: [chave, rotulo]
      properties:
        chave:
          type: string
          example: sono
        rotulo:
          type: string
          example: Sono
    MoodCheckin:
      description: O check-in de humor de um dia (execução do anel diário).
      type: object
      required: [valencia, energia, quadrante, respondido_em]
      properties:
        valencia:
          type: integer
          minimum: 0
          maximum: 100
        energia:
          type: integer
          minimum: 0
          maximum: 100
        quadrante:
          type: string
          description: Derivado determinístico (valência×energia).
          example: desagradavel_calmo
        emotion_label:
          type: string
          nullable: true
        context_tags:
          type: array
          nullable: true
          items:
            type: string
        respondido_em:
          type: string
          format: date-time
    RecordMoodCheckinRequest:
      type: object
      required: [valencia, energia]
      properties:
        valencia:
          type: integer
          minimum: 0
          maximum: 100
        energia:
          type: integer
          minimum: 0
          maximum: 100
        emotion_label:
          type: string
          description: Rótulo opcional do quadrante escolhido.
        context_tags:
          type: array
          items:
            type: string
          description: "Contexto opcional (chaves de context_tag: trabalho, sono...)."
    MoodToday:
      description: O check-in de hoje (ou nulo) e a elegibilidade do paciente.
      type: object
      required: [dia, can_checkin]
      properties:
        dia:
          type: string
          format: date
          description: Dia local (America/Sao_Paulo).
        can_checkin:
          type: boolean
          description: true quando há consentimento ativo e matrícula elegível.
        reason:
          type: string
          nullable: true
          enum: [consent_required, not_enrolled]
          description: Por que não pode registrar, quando `can_checkin` é false.
        checkin:
          $ref: "#/components/schemas/MoodCheckin"
          nullable: true
        offer:
          type: string
          nullable: true
          enum: [WHO5, PHQ4]
          description: >
            Instrumento de aprofundamento OFERECIDO agora pelo gatilho (deterioração
            sustentada no anel diário → WHO-5; WHO-5 sinalizando → PHQ-4). Nulo quando
            não há oferta. Derivado sob demanda do histórico.
        escalate:
          type: boolean
          description: >
            true quando o gatilho indica escalonamento à trilha CLÍNICA (PHQ-4
            positivo). Nunca vai ao gestor — só ao canal clínico/urgência.
    HelpChannel:
      description: >
        Canal de urgência/care navigation (triagem, não tratamento). O front roteia
        pelo `type`; sem informação de contato falsa no MVP.
      type: object
      required: [type, label, message]
      properties:
        type:
          type: string
          example: care_navigation
        label:
          type: string
        message:
          type: string
    AssessmentAvailability:
      description: Se o instrumento pode ser respondido agora, e seu descritor.
      type: object
      required: [codigo, eligibility, item_count, value_min, value_max]
      properties:
        codigo:
          type: string
          example: WHO5
        eligibility:
          $ref: "#/components/schemas/Eligibility"
        item_count:
          type: integer
          description: Quantos itens o instrumento tem.
        value_min:
          type: integer
        value_max:
          type: integer
    SubmitAssessmentRequest:
      type: object
      required: [codigo, items]
      properties:
        codigo:
          type: string
          enum: [WHO5, PHQ4]
        items:
          type: array
          items:
            type: integer
          description: Respostas Likert na ordem do instrumento.
    AssessmentResult:
      description: O resultado pontuado de um instrumento periódico.
      type: object
      required: [codigo, faixa, flag_encaminhar, respondido_em]
      properties:
        codigo:
          type: string
        raw_score:
          type: number
        index_score:
          type: number
          nullable: true
          description: WHO-5 (0–100); ausente no PHQ-4.
        subscores:
          type: object
          nullable: true
          additionalProperties:
            type: integer
          description: 'PHQ-4: {"phq2": x, "gad2": y}.'
        faixa:
          type: string
          description: Derivada dos cortes (normal | sinaliza | encaminha | moderado).
        flag_encaminhar:
          type: boolean
          description: Rastreio positivo — encaminha à trilha clínica.
        respondido_em:
          type: string
          format: date-time
    HealthStatus:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        service:
          type: string
        version:
          type: string
        time:
          type: string
          format: date-time
    Reason:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: >
            Código máquina-legível que o front traduz em frase. Ex.:
            QUOTA_EXHAUSTED_WEEKLY, MISSING_PREREQ:aval-psiquiatrica.
        detail:
          type: string
    # ---- Agendamento ----
    Specialty:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          example: 11111111-1111-4111-8111-111111111111
        name:
          type: string
          example: Psicologia
    SpecialtyList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Specialty"
    Professional:
      description: >
        O profissional como o paciente o vê na hora de escolher. Sem contato, sem
        CPF, sem agenda interna: o que não está aqui não vaza.
      type: object
      required: [id, full_name, license]
      properties:
        id:
          type: string
          example: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa
        full_name:
          type: string
          description: firstName + lastName do legado, já juntos.
          example: Ana Beatriz Moura
        image_url:
          type: string
          format: uri
          nullable: true
          description: >
            Foto. Nula é comum — a tela cai nas iniciais, não num ícone quebrado.
        license:
          $ref: "#/components/schemas/ProfessionalLicense"
    ProfessionalLicense:
      description: >
        Registro no conselho. É o que identifica publicamente o profissional e é
        com isso que o paciente escolhe — por isso é obrigatório, não enfeite.

        Vai em partes, e não como "CRP/SP 06/123456" pronto, porque as partes têm
        significado próprio: a região é uma UF e o RQE só existe para especialista
        (e por isso é exibido condicionalmente). Uma string pronta obrigaria o
        cliente a fazer parsing para qualquer coisa além de ecoar.
      type: object
      required: [council, number, region]
      properties:
        council:
          type: string
          description: "Conselho (licenseCouncil). Ex.: CRM (médico), CRP (psicólogo)."
          example: CRP
        number:
          type: string
          example: 06/123456
        region:
          type: string
          description: UF do registro.
          example: SP
        rqe:
          type: string
          nullable: true
          description: Registro de Qualificação de Especialista. Nulo quando não há.
          example: "54321"
    ProfessionalList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Professional"
    Slot:
      description: >
        Um horário livre. Autossuficiente de propósito: qualquer Slot, sozinho,
        tem tudo para ser renderizado certo, sem depender do contexto de onde veio.
      type: object
      required: [id, starts_at, ends_at, time_zone]
      properties:
        id:
          type: string
          description: Id do slot no legado (tb_slots), opaco.
          example: 50100000-0000-4000-8000-000000000001
        starts_at:
          type: string
          format: date-time
          description: >
            Instante do início, RFC 3339 COM offset. A origem no legado é DATETIME
            SEM fuso, que significa hora de parede de America/Sao_Paulo; quem
            resolve para instante é a API.

            Nunca mandamos "2026-07-20T09:00:00" sem offset: `new Date()` no
            browser leria isso no fuso do USUÁRIO, e um paciente viajando (ou um
            runner de CI em UTC) veria a hora errada — sem erro, sem aviso, só
            errado.
          example: "2026-07-20T09:00:00-03:00"
        ends_at:
          type: string
          format: date-time
          example: "2026-07-20T09:25:00-03:00"
        time_zone:
          type: string
          description: >
            Fuso IANA em que este horário DEVE ser exibido — o da agenda.

            Não é redundante com o offset de `starts_at`: o offset é propriedade
            de um INSTANTE, o fuso é a REGRA. A consulta é às 09:00 em São Paulo,
            e é 09:00 que o paciente precisa ler mesmo que o relógio dele esteja
            em Lisboa. Sem este campo o front só poderia formatar no fuso do
            browser — que é exatamente o erro.
          example: America/Sao_Paulo
    SlotPage:
      description: >
        A tela é "os horários da Ana": o profissional vem junto porque separá-lo
        em outra rota só acrescentaria um segundo estado de carregando e um
        segundo modo de falhar, para um dado que o servidor já tem em mãos.
      type: object
      required: [professional, from, to, items]
      properties:
        professional:
          $ref: "#/components/schemas/Professional"
        from:
          type: string
          format: date
          description: Primeiro dia do intervalo que o servidor de fato usou.
          example: "2026-07-20"
        to:
          type: string
          format: date
          description: Último dia (inclusive) que o servidor de fato usou.
          example: "2026-08-20"
        items:
          type: array
          items:
            $ref: "#/components/schemas/Slot"
    CreateAppointmentRequest:
      type: object
      required: [slot_id, specialty_id]
      properties:
        slot_id:
          type: string
          description: >
            O horário escolhido. Ele já determina o PROFISSIONAL
            (slot -> shift -> profissional), então o profissional não vem no
            corpo: mandar de novo o que o servidor já sabe criaria uma segunda
            verdade para conferir.
          example: 50100000-0000-4000-8000-000000000001
        specialty_id:
          type: string
          description: >
            A especialidade escolhida no primeiro passo.

            Precisa vir, e não é redundante: o vínculo profissional-especialidade
            é MUITOS-PARA-MUITOS no legado (tb_professionals_specialities), e há
            profissional com 2 e até 3 especialidades — o slot não diz para qual
            delas a consulta é. Sem este campo teríamos que adivinhar, e a
            especialidade errada iria parar no `appointment_specialty` da DAV e na
            tela do paciente.

            Tem que ser uma especialidade que o profissional do slot realmente
            atende; senão, 400.
          example: 11111111-1111-4111-8111-111111111111
    Appointment:
      description: >
        A consulta como o paciente a vê. Enxuta pelo mesmo motivo de `Account`:
        não carrega o id da DAV, nem o id do slot no legado, nem — jamais — o link
        da sala.
      type: object
      required: [id, status, starts_at, ends_at, time_zone, specialty, professional, join]
      properties:
        id:
          type: string
          format: uuid
          description: Id no renovi_care (UUID v7).
        status:
          type: string
          enum: [PROCESSING, CONFIRMED, UNCONFIRMED, CANCELLED]
          description: >
            O estado que interessa ao PACIENTE, não o estado interno da saga.

            - PROCESSING: reservamos o horário e estamos criando a consulta na DAV.
            - CONFIRMED: existe na DAV e temos o link. É o caso normal.
            - UNCONFIRMED: a DAV não respondeu e NÃO temos como descobrir se
              criou (ela recusa id nosso e não tem rota de busca — achado #12).
              O horário fica retido e alguém do time verifica. A tela precisa
              dizer isso com todas as letras: esconder seria pior, porque o
              paciente pode ter uma consulta de verdade marcada.
            - CANCELLED.

            Consulta que comprovadamente não aconteceu não aparece nesta lista.
        starts_at:
          type: string
          format: date-time
          example: "2026-07-20T09:00:00-03:00"
        ends_at:
          type: string
          format: date-time
          example: "2026-07-20T09:25:00-03:00"
        time_zone:
          type: string
          description: Fuso IANA para exibição (mesma regra de Slot.time_zone).
          example: America/Sao_Paulo
        specialty:
          $ref: "#/components/schemas/Specialty"
        professional:
          $ref: "#/components/schemas/AppointmentProfessional"
        join:
          $ref: "#/components/schemas/JoinWindow"
        created_at:
          type: string
          format: date-time
    AppointmentProfessional:
      description: >
        O profissional COMO ELE ERA quando a consulta foi marcada — e por isso é
        mais enxuto que o `Professional` da escolha.

        O motivo é honestidade: a consulta guarda uma FOTOGRAFIA do legado (nome e
        especialidade), porque as FKs de lá são ON DELETE CASCADE e o schema é de
        terceiro — se o profissional for renomeado ou removido, a consulta antiga
        ainda precisa saber se descrever. Mas não fotografamos o registro no
        conselho, então prometer o `Professional` inteiro aqui devolveria
        `council: ""` e a tela mostraria "CRP/ ". Um campo obrigatório vazio é pior
        que um campo ausente.

        O registro no conselho é o que ajuda a ESCOLHER, e aparece lá (em
        /specialties/{id}/professionals). Depois de marcada, o que importa é quem e
        quando.
      type: object
      required: [id, full_name]
      properties:
        id:
          type: string
          example: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa
        full_name:
          type: string
          description: O nome como estava no legado no momento do agendamento.
          example: Ana Beatriz Moura
    AppointmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
    JoinWindow:
      description: >
        O ESTADO da janela de acesso — nunca o link. Vem junto da consulta porque
        é o que a tela precisa para obedecer à regra de ouro de UX do
        apps/web/CLAUDE.md: nunca um botão só desabilitado, sempre o motivo.

        Repare que "30 minutos" não existe em lugar nenhum deste contrato: o que
        viaja é `opens_at`, JÁ CALCULADO pelo servidor. O front espera uma hora
        que recebeu em vez de aplicar uma regra que decorou — então mudar a
        antecedência é uma linha no servidor, sem deploy do front, e relógio
        errado no cliente não abre a sala mais cedo.
      type: object
      required: [status, opens_at, closes_at]
      properties:
        status:
          type: string
          enum: [OPEN, TOO_EARLY, TOO_LATE, UNAVAILABLE]
          description: >
            Decidido com o relógio do SERVIDOR. UNAVAILABLE = a consulta não está
            confirmada ou não temos link para ela — é diferente de "ainda não" e
            merece outra frase.
        opens_at:
          type: string
          format: date-time
          description: A partir de quando o POST .../join devolve o link.
          example: "2026-07-20T08:30:00-03:00"
        closes_at:
          type: string
          format: date-time
          example: "2026-07-20T09:25:00-03:00"
        reason:
          $ref: "#/components/schemas/Reason"
    JoinTicket:
      description: >
        O link de acesso do paciente à sala da DAV. É uma CAPACIDADE, não um dado:
        não guarde em cache, não coloque em log, não mande por e-mail.
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://renovisaude.atendimento.hom.dav.med.br/a/piaxwqee5f
    # -------------------------------------------------------------------------
    # Linhas de cuidado (Slice 1, SPEC §3). Vocabulário: a LINHA é um template
    # versionado (draft -> published) de ITENS; a MATRÍCULA liga um paciente a uma
    # versão publicada; a JORNADA é a matrícula vista item a item, cada um com o
    # veredito do motor de elegibilidade. Admin monta o template; paciente lê a
    # jornada e agenda o que o motor liberar.
    # -------------------------------------------------------------------------
    EligibilityBlock:
      description: >
        Um motivo, JÁ PRONTO PARA EXIBIR, de o motor ter barrado um item. Vem em
        lista porque um item pode esbarrar em mais de uma regra ao mesmo tempo. O
        `rule_type` existe para o front reagir por CÓDIGO (destacar a data em
        MAX_ADVANCE, o pré-requisito em PREREQUISITE), não por texto.
      type: object
      required: [rule_type, reason]
      properties:
        rule_type:
          type: string
          enum: [VIGENCIA, QUOTA, MIN_INTERVAL, MAX_ADVANCE, PREREQUISITE]
          description: >
            Qual regra barrou. VIGENCIA é da MATRÍCULA (fora do período de
            validade) e por isso não é uma regra armazenada como as outras quatro.
        reason:
          type: string
          description: Frase em PT-BR pronta para o paciente ler.
        available_from:
          type: string
          format: date-time
          description: >
            Quando o item destrava, SE o desbloqueio depende do relógio (janela de
            cota, intervalo mínimo, antecedência máxima). AUSENTE quando depende de
            AÇÃO (um pré-requisito a cumprir), que não tem data.
          example: "2026-08-01T00:00:00-03:00"
    Eligibility:
      description: >
        O veredito do motor para UM item, no instante avaliado. `allowed` resume
        (`blocks` vazio); `blocks` diz por que não, quando não. O front usa isto
        para obedecer à regra de ouro de UX do apps/web/CLAUDE.md: nunca um botão
        só desabilitado, sempre o porquê.
      type: object
      required: [allowed, blocks]
      properties:
        allowed:
          type: boolean
        blocks:
          type: array
          description: Vazio quando `allowed` é true.
          items:
            $ref: "#/components/schemas/EligibilityBlock"
    CareLineRule:
      description: >
        Uma regra de elegibilidade presa a um item do template. `params` é aberto
        de propósito: cada `rule_type` tem sua forma (QUOTA leva janela e limite,
        PREREQUISITE leva o item exigido e N), e travar isso no contrato agora
        engessaria o motor antes de o SPEC estabilizar.
      type: object
      required: [rule_type, params]
      properties:
        rule_type:
          type: string
          enum: [QUOTA, MIN_INTERVAL, MAX_ADVANCE, PREREQUISITE]
          description: >
            As quatro regras ARMAZENÁVEIS. VIGENCIA não entra: é da matrícula,
            avaliada sempre, não uma regra que o admin liga por item.
        params:
          type: object
          additionalProperties: true
          description: Parâmetros da regra, específicos de cada `rule_type`.
    CareLineItem:
      description: >
        Um passo da linha — uma CONSULTA de uma especialidade ou uma ATIVIDADE
        executada na plataforma (ex.: check-in de humor do Anexo C). `ref` é o
        código estável do item DENTRO da linha (o que as regras de pré-requisito
        referenciam), distinto do `id` (UUID).
      type: object
      required: [id, ref, kind, specialty_code, label, sort_order, rules]
      properties:
        id:
          type: string
          format: uuid
        ref:
          type: string
          description: >
            Código do item dentro da linha (estável entre versões), referenciado
            pelas regras de pré-requisito.
          example: aval-inicial
        kind:
          type: string
          enum: [CONSULTA, ATIVIDADE]
          description: >
            CONSULTA (aponta para uma especialidade do legado) ou ATIVIDADE
            (executada na plataforma, sem especialidade).
        specialty_code:
          type: string
          description: >
            A especialidade da consulta (código do catálogo do legado). Vazio
            para itens ATIVIDADE, que não têm especialidade.
        label:
          type: string
          description: 'Rótulo em PT-BR exibido ao paciente. Ex.: "Avaliação inicial".'
        recurrence:
          type: string
          nullable: true
          description: >
            Cadência em TEXTO LIVRE, só informativa (ex.: "4x por mês") — o que o
            paciente lê. NÃO é avaliada pelo motor: as regras que de fato valem
            estão em `rules`. Nula quando não há cadência a exibir.
        sort_order:
          type: integer
          description: Ordem de exibição do item na linha.
        rules:
          type: array
          items:
            $ref: "#/components/schemas/CareLineRule"
    CareLine:
      description: >
        O TEMPLATE de uma linha de cuidado, versionado. Nasce `draft` (o admin
        monta itens e regras) e ao `published` vira imutável e passa a valer para
        NOVAS matrículas. `version` sobe a cada publicação do mesmo `code`.
      type: object
      required: [id, code, version, name, description, status, items]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: Código estável da linha (constante entre versões).
          example: saude-mental
        version:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, published]
        published_at:
          type: string
          format: date-time
          description: Quando esta versão foi publicada. Ausente enquanto `draft`.
        items:
          type: array
          items:
            $ref: "#/components/schemas/CareLineItem"
    CareLineList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CareLine"
    EnrollmentPeriod:
      description: >
        Uma janela de validade da matrícula. A renovação NÃO edita o período
        vigente: acrescenta outro, para a jornada guardar por quais janelas o
        paciente passou.
      type: object
      required: [id, starts_at, ends_at, source]
      properties:
        id:
          type: string
          format: uuid
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        source:
          type: string
          enum: [admin]
          description: Origem da concessão. Só `admin` no Slice 1 (sem autosserviço).
    Enrollment:
      description: >
        O vínculo de um paciente a uma VERSÃO publicada da linha. `care_line_version`
        é congelado na matrícula: republicar a linha não muda a jornada de quem já
        está matriculado. `valid_from`/`valid_until` resumem a vigência corrente; o
        detalhe por janela está em `periods`.
      type: object
      required:
        [id, patient_id, care_line_code, care_line_version, status, valid_from, valid_until, periods]
      properties:
        id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        care_line_code:
          type: string
        care_line_version:
          type: integer
        status:
          type: string
          enum: [ativa, pausada, concluida, encerrada, expirada]
          description: >
            `ativa` vale e está na vigência; `expirada` passou da vigência sem
            renovar; `concluida`/`encerrada` são desfechos deliberados do admin;
            `pausada` é suspensão temporária.
        valid_from:
          type: string
          format: date-time
        valid_until:
          type: string
          format: date-time
        periods:
          type: array
          items:
            $ref: "#/components/schemas/EnrollmentPeriod"
    CareAppointment:
      description: >
        A consulta de um item da linha, na visão da JORNADA. NÃO é o mesmo que
        `Appointment` (o agendamento no módulo de booking): esta amarra a consulta
        ao ITEM da linha e ao motor. O `booking_id` é a ponte — é o `id` que o
        paciente usa nas rotas /appointments existentes para ver detalhes e entrar
        na sala.
      type: object
      required: [id, item_ref, label, status, scheduled_at, time_zone, booking_id]
      properties:
        id:
          type: string
          format: uuid
        item_ref:
          type: string
          description: O `ref` do item da linha a que esta consulta atende.
        label:
          type: string
          description: Rótulo do item (copiado para a tela não precisar cruzar dados).
        status:
          type: string
          enum: [agendada, confirmada, em_andamento, realizada, falta, cancelada]
        scheduled_at:
          type: string
          format: date-time
          example: "2026-07-20T09:00:00-03:00"
        time_zone:
          type: string
          description: Fuso IANA para exibição (mesma regra de Slot.time_zone).
          example: America/Sao_Paulo
        cancelled_at:
          type: string
          format: date-time
          description: Quando foi cancelada. Ausente quando não foi.
        booking_id:
          type: string
          format: uuid
          description: >
            Id da consulta no módulo de booking (o `id` de `Appointment`). O
            paciente o usa em GET /appointments/{id} e POST .../join.
    CareAppointmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CareAppointment"
    AnnotatedSlot:
      description: >
        Um horário livre JÁ com o profissional e o veredito do motor embutidos. A
        disponibilidade de uma LINHA agrega horários de VÁRIOS profissionais da
        especialidade do item — por isso o profissional vai POR SLOT (diferente do
        SlotPage, que é a agenda de um profissional só). A elegibilidade vem junta
        para a tela não ter que chamar /me/eligibility por horário.
      allOf:
        - $ref: "#/components/schemas/Slot"
        - type: object
          required: [professional, eligibility]
          properties:
            professional:
              $ref: "#/components/schemas/AppointmentProfessional"
            eligibility:
              $ref: "#/components/schemas/Eligibility"
    AvailabilityPage:
      description: >
        Os horários agendáveis para um item da linha, no intervalo pedido. Ecoa o
        `from`/`to` que o servidor de fato usou (mesma razão do SlotPage: "hoje" só
        existe num fuso, e quem o sabe é o servidor).
      type: object
      required: [item_id, from, to, items]
      properties:
        item_id:
          type: string
          format: uuid
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: "#/components/schemas/AnnotatedSlot"
    JourneyEvent:
      description: >
        Um fato da jornada (event log append-only, SPEC §3.3). É a única fonte que
        o motor lê e o que a auditoria devolve. `payload` é aberto porque cada tipo
        carrega dados próprios (o id da consulta, o novo status, a origem da
        renovação).
      type: object
      required: [id, event_type, actor, occurred_at, payload]
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
          enum:
            - matricula_criada
            - matricula_renovada
            - matricula_expirada
            - matricula_encerrada
            - consulta_agendada
            - consulta_cancelada
            - consulta_status_forcado
        actor:
          type: string
          enum: [paciente, sistema, admin]
          description: >
            Quem provocou o fato: `paciente` (agendou/cancelou), `sistema`
            (expiração automática) ou `admin` (matrícula, forçar status).
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    JourneyItem:
      description: Um item da linha com o veredito do motor avaliado para AGORA.
      type: object
      required: [item, eligibility]
      properties:
        item:
          $ref: "#/components/schemas/CareLineItem"
        eligibility:
          $ref: "#/components/schemas/Eligibility"
    JourneyEnrollment:
      description: >
        Uma matrícula pronta para a tela de jornada: a matrícula, o nome da linha
        (para a tela não cruzar com /admin), os itens já com veredito e os eventos
        recentes.
      type: object
      required: [enrollment, care_line_name, items, recent_events]
      properties:
        enrollment:
          $ref: "#/components/schemas/Enrollment"
        care_line_name:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/JourneyItem"
        recent_events:
          type: array
          items:
            $ref: "#/components/schemas/JourneyEvent"
    Journey:
      description: >
        A jornada do portador da sessão: todas as suas matrículas, cada uma com
        itens e vereditos. Envelope `enrollments` (não array de topo) pelo mesmo
        motivo dos `items`: dá para crescer sem quebrar o cliente.
      type: object
      required: [enrollments]
      properties:
        enrollments:
          type: array
          items:
            $ref: "#/components/schemas/JourneyEnrollment"
    AuditPage:
      description: >
        Uma página do event log. `next_cursor` é OPACO — o cliente o devolve como
        veio, sem interpretar; ausente significa fim.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/JourneyEvent"
        next_cursor:
          type: string
          description: Cursor opaco para a próxima página. Ausente = não há mais.
    # ---- Requisições (admin monta o template e as matrículas) ----
    CreateCareLineRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          description: Código estável da linha. Único entre linhas draft.
          example: saude-mental
        name:
          type: string
        description:
          type: string
    CreateCareLineItemRequest:
      type: object
      required: [ref, kind, label]
      properties:
        ref:
          type: string
          example: aval-inicial
        kind:
          type: string
          enum: [CONSULTA, ATIVIDADE]
        specialty_code:
          type: string
          description: >
            Obrigatório para CONSULTA; omitido (ou vazio) para ATIVIDADE, que não
            tem especialidade.
        label:
          type: string
        recurrence:
          type: string
          nullable: true
          description: >
            Cadência em texto livre, informativa (ex.: "4x por mês"). As regras
            aplicadas ficam em `rules`, não aqui.
        sort_order:
          type: integer
          description: Ordem na linha. Default a cargo do servidor quando ausente.
    CreateCareLineRuleRequest:
      type: object
      required: [rule_type, params]
      properties:
        rule_type:
          type: string
          enum: [QUOTA, MIN_INTERVAL, MAX_ADVANCE, PREREQUISITE]
        params:
          type: object
          additionalProperties: true
    CreateEnrollmentRequest:
      type: object
      required: [patient_id, care_line_code, months]
      properties:
        patient_id:
          type: string
          format: uuid
        care_line_code:
          type: string
          description: A linha é resolvida para a ÚLTIMA versão publicada deste code.
        months:
          type: integer
          enum: [1, 2, 3]
          description: Vigência concedida, em meses (1, 2 ou 3).
    RenewEnrollmentRequest:
      type: object
      required: [months]
      properties:
        months:
          type: integer
          enum: [1, 2, 3]
          description: Meses acrescentados à vigência (novo período, não edita o atual).
    EndEnrollmentRequest:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [concluida, encerrada]
          description: >
            O desfecho: `concluida` (paciente terminou a linha) ou `encerrada`
            (interrompida). São desfechos distintos na jornada, por isso o admin
            escolhe qual.
        reason:
          type: string
          description: Justificativa registrada no event log (auditoria).
    CreateCareAppointmentRequest:
      type: object
      required: [item_id, slot_id]
      properties:
        item_id:
          type: string
          format: uuid
          description: O item da linha para o qual se agenda.
        slot_id:
          type: string
          description: Id do horário escolhido no legado (opaco), como em AnnotatedSlot.
    ForceStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [realizada, falta]
          description: O status a forçar na consulta (rota interna de teste).
    Problem:
      description: Erro no formato RFC 7807 (problem+json).
      type: object
      required: [title, status]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        # Membro de extensão, previsto pela própria RFC 7807 (§3.2). Existe para
        # que um erro seja tratado por CÓDIGO e não por texto: "cedo demais" e
        # "consulta cancelada" são ambos 409, e o front reage diferente a cada um.
        # Casar pelo `detail` seria casar por frase escrita para humano — que muda
        # no dia em que alguém melhorar o texto.
        #
        # Reusa o `Reason` do motor de elegibilidade DE PROPÓSITO: uma tabela de
        # tradução só, no front, servindo erro e veredito.
        reason:
          $ref: "#/components/schemas/Reason"
        # Extensões (§3.2) opcionais, presentes só em erros específicos — e por
        # serem opcionais, backward-compatible com quem já lê Problem.
        # `blocks`: os bloqueios do motor no 422 de agendamento (EligibilityBlocked).
        blocks:
          type: array
          description: >
            Bloqueios do motor de elegibilidade. Presente no 422 de agendamento
            barrado; cada item explica UMA regra violada.
          items:
            $ref: "#/components/schemas/EligibilityBlock"
        # `errors`: a lista de erros de validação no 400 de publicação (PublishInvalid).
        errors:
          type: array
          description: >
            Erros de validação. Presente no 400 de publicação de linha, com todos
            os problemas do template de uma vez.
          items:
            type: string
security:
  - cookieAuth: []
